global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: masterfabric-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - nginx:8080
        labels:
          service: masterfabric-api

  - job_name: mlc-llm
    metrics_path: /health
    static_configs:
      - targets:
          - mlc-llm:8080
        labels:
          service: mlc-llm
