# Local development stack only.
# SECURITY: default credentials are weak; change them before any shared network use.
# Database and cache ports bind to loopback by default (override via *_HOST_BIND env vars).
services:
  postgres:
    image: postgres:16-alpine
    container_name: masterfabric-postgres
    environment:
      POSTGRES_USER: masterfabric
      POSTGRES_PASSWORD: masterfabric
      POSTGRES_DB: masterfabric
    ports:
      - "${DB_HOST_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterfabric"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masterfabric-redis
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: masterfabric-kafka
    ports:
      - "${KAFKA_HOST_BIND:-127.0.0.1}:${KAFKA_PORT:-9092}:9092"
    environment:
      # KRaft single-node setup
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: "MasterfabricKafkaClusterId1"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: masterfabric-kafka-ui
    ports:
      - "${KAFKA_UI_HOST_BIND:-127.0.0.1}:8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: masterfabric
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # --- Phase 5 stack (profile: stack) ---
  mlc-llm:
    profiles: ["stack"]
    build:
      context: ./mock-llm
      dockerfile: Dockerfile
    container_name: masterfabric-mlc-llm
    ports:
      - "${MLC_HOST_BIND:-127.0.0.1}:8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    profiles: ["stack"]
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      APP_ENV: development
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_WRITE_TIMEOUT_SECONDS: 130
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: masterfabric
      DB_PASSWORD: masterfabric
      DB_NAME: masterfabric
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_ENABLED: "false"
      JWT_SECRET: change-me-in-production
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      LLM_ENABLED: "true"
      LLM_PROVIDER: gemma
      LLM_BASE_URL: http://mlc-llm:8080/v1
      LLM_MODEL: mock-mlc-model
      LLM_API_KEY: compose-dev-key
      LLM_TIMEOUT_SECONDS: 120
      LLM_MAX_RETRIES: 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlc-llm:
        condition: service_healthy
    stop_grace_period: 120s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    profiles: ["stack"]
    image: nginx:1.27-alpine
    container_name: masterfabric-nginx
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_PORT:-8080}:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    profiles: ["stack"]
    image: prom/prometheus:v2.55.1
    container_name: masterfabric-prometheus
    ports:
      - "${PROMETHEUS_HOST_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    profiles: ["stack"]
    image: grafana/grafana:11.4.0
    container_name: masterfabric-grafana
    ports:
      - "${GRAFANA_HOST_BIND:-127.0.0.1}:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  kafkadata:
  promdata:
  grafanadata:
